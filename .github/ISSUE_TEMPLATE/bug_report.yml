name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: |
        - OS:
        - Python version:
        - Node version:
        - Browser (if frontend issue):
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional Context
      description: Logs, screenshots, or any other relevant information.
    validations:
      required: false
