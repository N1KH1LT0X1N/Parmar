name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed Solution
      description: Describe the feature or enhancement you'd like.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional Context
      description: Screenshots, mockups, or any other relevant information.
    validations:
      required: false
